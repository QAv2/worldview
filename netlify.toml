[build]
  command = "sed -i \"s/__AISSTREAM_API_KEY__/$AISSTREAM_API_KEY/g\" js/vessels.js && sed -i \"s/__GOOGLE_MAPS_API_KEY__/$GOOGLE_MAPS_API_KEY/g\" js/globe.js && sed -i \"s/__MAPTILER_API_KEY__/$MAPTILER_API_KEY/g\" js/globe.js"
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
